# Local/demo secret with throwaway in-cluster credentials.
# In a real deploy this file is NOT applied — you create `app-secret` on the
# cluster out-of-band with your managed RDS/ElastiCache URLs (see
# k8s/overlays/aws/README.md), so real credentials never live in git.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: payments
type: Opaque
stringData:
  DATABASE_URL: "postgres://payments:payments@postgres:5432/payments"
  POSTGRES_PASSWORD: "payments"
