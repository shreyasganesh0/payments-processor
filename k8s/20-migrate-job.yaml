# Applies pending migrations before the app processes traffic.
# Run to completion first: `kubectl -n payments wait --for=condition=complete job/migrate`.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: payments
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: payments-processor-app:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["node", "apps/api/dist/migrate.js"]
          # config.ts validates ALL vars at load (not just DATABASE_URL), so the
          # migrate pod needs the ConfigMap too or it fails on missing REDIS_URL.
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secret }
