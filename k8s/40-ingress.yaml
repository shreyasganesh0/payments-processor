# Public entry. Web at payments.local, API at api.payments.local (separate hosts
# so no path rewriting is needed). Add these to /etc/hosts pointing at the
# ingress controller's IP for a local cluster. Only api + web are public; relay
# and worker have no Service and no ingress.
#
# NOTE (build-time gotcha, ADR-013): the web bundle inlines NEXT_PUBLIC_API_BASE
# at `next build`. For this ingress the web image must be built with
#   NEXT_PUBLIC_API_BASE=http://api.payments.local
# a runtime env var will NOT change it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payments
  namespace: payments
spec:
  rules:
    - host: payments.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port: { number: 3001 }
    - host: api.payments.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port: { number: 3000 }
