apiVersion: v1
kind: Namespace
metadata:
  name: payments
---
# Non-secret runtime config — maps 1:1 onto the config.ts env vars (ADR-013).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: payments
data:
  NODE_ENV: "production" # config.ts then REQUIRES the datastore URLs (fail-fast)
  PORT: "3000"
  METRICS_PORT: "9101" # every worker pod is network-isolated, so no port collision
  # the web's public origin (the ingress host serving the console)
  CORS_ORIGIN: "http://payments.local"
  # in-cluster Redis; swap for a managed endpoint (ElastiCache/Memorystore) in prod
  REDIS_URL: "redis://valkey:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: payments
type: Opaque
stringData:
  # in-cluster Postgres; swap for a managed endpoint (RDS/Cloud SQL, with TLS) in prod
  DATABASE_URL: "postgres://payments:payments@postgres:5432/payments"
  POSTGRES_PASSWORD: "payments"
