# Datastores for a self-contained cluster (kind / minikube).
# In production these are MANAGED services and this file is deleted — only the
# DATABASE_URL / REDIS_URL in the ConfigMap/Secret change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: payments }
            - { name: POSTGRES_DB, value: payments }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: app-secret, key: POSTGRES_PASSWORD }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "payments"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: payments
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels: { app: valkey }
  template:
    metadata:
      labels: { app: valkey }
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: payments
spec:
  selector: { app: valkey }
  ports:
    - port: 6379
      targetPort: 6379
