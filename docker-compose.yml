x-app: &app
  build:
    context: .
    # Bake the web bundle's API base from the same .env that CORS_ORIGIN reads, so
    # the (baked) NEXT_PUBLIC_API_BASE and (runtime) CORS_ORIGIN can't drift. Next
    # inlines this at build time (ADR-013); the Dockerfile ARG is the fallback.
    args:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:3000}
  image: payments-processor-app
  environment: &app-env
    DATABASE_URL: postgres://payments:payments@postgres:5432/payments
    REDIS_URL: redis://valkey:6379
    # Allowlist of the console's public origins. Pairs with NEXT_PUBLIC_API_BASE
    # (baked build-arg above); both browser hosts reach the same API, so listing
    # both lets the console load at localhost OR 127.0.0.1.
    CORS_ORIGIN: http://localhost:3001,http://127.0.0.1:3001
  restart: unless-stopped

x-app-deps: &app-deps
  postgres:
    condition: service_healthy
  valkey:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

services:

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=payments
      - POSTGRES_DB=payments
      - POSTGRES_USER=payments
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # one-shot: apply migrations before the app roles start
  migrate:
    <<: *app
    restart: "no"
    working_dir: /app
    command: node apps/api/dist/migrate.js
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app
    working_dir: /app
    command: node apps/api/dist/main.js
    ports:
      - "3000:3000"
    depends_on: *app-deps
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  relay:
    <<: *app
    working_dir: /app
    command: node apps/api/dist/relay.js
    depends_on: *app-deps

  worker:
    <<: *app
    working_dir: /app
    command: node apps/api/dist/worker.js
    ports:
      - "9101:9101"
    depends_on: *app-deps

  web:
    <<: *app
    working_dir: /app
    command: node apps/web/server.js
    environment:
      <<: *app-env
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_started

  # TEST-ONLY webhook receiver for `make demo-webhooks`. Gated behind the
  # `webhooks-demo` profile so it NEVER starts on `make up`/`make demo`. It's a
  # stock node:alpine running a bind-mounted script -- not the app image, not in
  # any k8s manifest -- so it cannot reach a CD/prod deployment. The worker
  # reaches it over the compose network via the `receiver.local` alias (a dotted
  # host, required because @IsUrl rejects bare service names / localhost).
  webhook-receiver:
    profiles: ["webhooks-demo"]
    image: node:22-alpine
    restart: unless-stopped
    command: node /app/webhook-receiver.mjs
    volumes:
      - ./scripts/webhook-receiver.mjs:/app/webhook-receiver.mjs:ro
    environment:
      OK_SECRET: ${WEBHOOK_OK_SECRET:-}
      FAIL_SECRET: ${WEBHOOK_FAIL_SECRET:-}
    ports:
      - "9099:9099"
    networks:
      default:
        aliases:
          - receiver.local

volumes:
  postgres-data:
