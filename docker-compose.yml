x-app: &app
  build: .
  image: payments-processor-app
  environment: &app-env
    DATABASE_URL: postgres://payments:payments@postgres:5432/payments
    REDIS_URL: redis://valkey:6379
    CORS_ORIGIN: http://localhost:3001
  restart: unless-stopped

x-app-deps: &app-deps
  postgres:
    condition: service_healthy
  valkey:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

services:

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=payments
      - POSTGRES_DB=payments
      - POSTGRES_USER=payments
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # one-shot: apply migrations before the app roles start
  migrate:
    <<: *app
    restart: "no"
    working_dir: /app
    command: node apps/api/dist/migrate.js
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app
    working_dir: /app
    command: node apps/api/dist/main.js
    ports:
      - "3000:3000"
    depends_on: *app-deps
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  relay:
    <<: *app
    working_dir: /app
    command: node apps/api/dist/relay.js
    depends_on: *app-deps

  worker:
    <<: *app
    working_dir: /app
    command: node apps/api/dist/worker.js
    ports:
      - "9101:9101"
    depends_on: *app-deps

  web:
    <<: *app
    working_dir: /app
    command: node apps/web/server.js
    environment:
      <<: *app-env
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
