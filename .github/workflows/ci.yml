name: CI 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @payments/shared build # shared resolves to dist; build before typecheck/test
      - run: pnpm typecheck
      - run: pnpm -r lint
      - run: pnpm -r --filter='!@apps/e2e' test # e2e is black-box; needs a live stack (run via `make e2e`)
