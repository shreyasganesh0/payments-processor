name: CD

# Auto-deploy on merge to main. The target instance + web API base come from the
# secrets/vars that scripts/aws/up.sh sets on each provision:
#   secrets EC2_HOST / EC2_USER / EC2_SSH_KEY, variable PUBLIC_API_BASE
# The image is streamed straight into k3s over SSH (no registry auth). If EC2_HOST
# is unset (nothing provisioned) the job no-ops instead of failing.
on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: gate
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          if [ -n "$HOST" ]; then echo "go=true" >> "$GITHUB_OUTPUT"
          else echo "no EC2_HOST secret — nothing deployed, skipping"; echo "go=false" >> "$GITHUB_OUTPUT"; fi

      - if: steps.gate.outputs.go == 'true'
        uses: docker/setup-buildx-action@v3

      # NEXT_PUBLIC_API_BASE is inlined into the web bundle at build time (ADR-013),
      # so it must be the deployment's PUBLIC api origin (up.sh sets PUBLIC_API_BASE).
      - name: Build image
        if: steps.gate.outputs.go == 'true'
        run: docker build --build-arg NEXT_PUBLIC_API_BASE="${{ vars.PUBLIC_API_BASE }}" -t payments-processor-app:${{ github.sha }} .

      - name: Ship to k3s + roll out
        if: steps.gate.outputs.go == 'true'
        env:
          HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          SHA: ${{ github.sha }}
        run: |
          echo "$SSH_KEY" > key && chmod 600 key
          SSH="ssh -o StrictHostKeyChecking=no -i key ${SSH_USER}@${HOST}"
          IMG="docker.io/library/payments-processor-app:${SHA}"
          # stream the built image into the node's containerd (no registry needed)
          docker save payments-processor-app:${SHA} | gzip | $SSH "gunzip | sudo k3s ctr images import -"
          # sync the repo on the box to this commit, then migrate + roll out
          $SSH "cd ~/payments-processor && git fetch -q origin && git reset --hard -q ${SHA} && PP_REPO_DIR=~/payments-processor bash scripts/aws/rollout.sh ${IMG}"
